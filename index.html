<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RobPaasPoker</title>
  <meta name="description" content="Rob Paas — professional tournament poker player. Streams, strategy breakdowns, and the Road to 100K challenge.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div class="page">

    <header class="site-header">
      <div class="brand-name">Rob<span>Paas</span>Poker</div>
      <div class="brand-rule"></div>
      <nav class="social-row" aria-label="Social media">
        <a class="social-icon" href="https://www.instagram.com/robpaaspoker/" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/instagram/C9A84C" alt="Instagram" loading="lazy"></a>
        <a class="social-icon" href="https://x.com/RobPaasPoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/x/C9A84C" alt="X" loading="lazy"></a>
        <a class="social-icon" href="https://www.youtube.com/@RobPaasPoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/youtube/C9A84C" alt="YouTube" loading="lazy"></a>
        <a class="social-icon" href="https://www.facebook.com/RobPaasPoker/" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/facebook/C9A84C" alt="Facebook" loading="lazy"></a>
        <a class="social-icon" href="https://www.tiktok.com/@robpaaspoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/tiktok/C9A84C" alt="TikTok" loading="lazy"></a>
        <a class="social-icon" href="https://www.twitch.tv/robpaaspoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/twitch/C9A84C" alt="Twitch" loading="lazy"></a>
        <a class="social-icon" href="https://kick.com/robpaaspoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/kick/C9A84C" alt="Kick" loading="lazy"></a>
      </nav>
    </header>

    <section class="card profile-card" id="profile-card">
      <div class="bio">
        <p>I'm Rob from London, Ontario &mdash; Professional tournament poker player, strategy breakdowns, and the honest reality of playing for a living.</p>
      </div>
    </section>

    <section>
      <a class="card cta-card" href="Roadto$100k/">
        <div class="cta-title">Road to 100K</div>
        <div class="cta-sub">Follow the 2026 challenge &mdash; daily profit, a full calendar, and progress toward $100,000 &rarr;</div>
        <div class="mini-meter">
          <div class="mini-meter-fill" id="mini-meter-fill" style="width: 0%"></div>
        </div>
        <div class="mini-meter-caption" id="mini-meter-caption">&nbsp;</div>
      </a>
    </section>

    <section>
      <h2 class="section-label">Latest Stream</h2>
      <div class="card video-wrap">
        <!-- Update the video ID here whenever there's a new VOD to feature -->
        <iframe
          src="https://player.twitch.tv/?video=2820038904&parent=robpaaspoker.com&parent=www.robpaaspoker.com&parent=robertjpaas-commits.github.io&parent=localhost"
          allowfullscreen
          scrolling="no">
        </iframe>
      </div>
    </section>

  </div>

  <script>
    fetch('Roadto$100k/data/2026.json', { cache: 'no-store' })
      .then((r) => r.json())
      .then((d) => {
        const total = d.days.reduce((sum, day) => sum + day.total, 0);
        const pct = Math.max(0, Math.min(100, (total / d.goal) * 100));
        const sign = total < 0 ? '-' : '+';
        const amount = Math.abs(total).toLocaleString('en-US', { maximumFractionDigits: 0 });
        document.getElementById('mini-meter-fill').style.width = pct.toFixed(1) + '%';
        document.getElementById('mini-meter-caption').textContent =
          `${sign}$${amount} · ${pct.toFixed(1)}% to $100K`;
      })
      .catch(() => {});
  </script>
</body>
</html>
