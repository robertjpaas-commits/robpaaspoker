<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RobPaasPoker</title>
  <meta name="description" content="Rob Paas — professional tournament poker player. Streams, strategy breakdowns, and the Road to 100K challenge.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=10">
</head>
<body>
  <div class="page">

    <header class="site-header">
      <div class="brand-name">Rob<span>Paas</span>Poker</div>
      <div class="brand-rule"></div>
      <nav class="social-row" aria-label="Social media">
        <a class="social-icon instagram" href="https://www.instagram.com/robpaaspoker/" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/instagram/FFFFFF" alt="Instagram" loading="lazy"></a>
        <a class="social-icon x" href="https://x.com/RobPaasPoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/x/FFFFFF" alt="X" loading="lazy"></a>
        <a class="social-icon youtube" href="https://www.youtube.com/@RobPaasPoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/youtube/FFFFFF" alt="YouTube" loading="lazy"></a>
        <a class="social-icon facebook" href="https://www.facebook.com/RobPaasPoker/" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/facebook/FFFFFF" alt="Facebook" loading="lazy"></a>
        <a class="social-icon tiktok" href="https://www.tiktok.com/@robpaaspoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/tiktok/FFFFFF" alt="TikTok" loading="lazy"></a>
        <a class="social-icon twitch" href="https://www.twitch.tv/robpaaspoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/twitch/FFFFFF" alt="Twitch" loading="lazy"></a>
        <a class="social-icon kick" href="https://kick.com/robpaaspoker" target="_blank" rel="noopener"><img src="https://cdn.simpleicons.org/kick/000000" alt="Kick" loading="lazy"></a>
      </nav>
    </header>

    <section>
      <a class="card cta-card" href="about/">
        <div class="cta-title">About Me</div>
        <div class="cta-sub">Who I am, my story, and how I ended up playing poker for a living &rarr;</div>
      </a>
    </section>

    <section>
      <a class="card cta-card" href="Roadto$100k/">
        <div class="cta-title">Road to $100K</div>
        <div class="cta-sub">Follow the 2026 challenge &mdash; daily profit, a full calendar, and progress toward $100,000 &rarr;</div>
        <div class="mini-meter">
          <div class="mini-meter-fill" id="mini-meter-fill" style="width: 0%"></div>
        </div>
        <div class="mini-meter-caption"><span id="mini-meter-amount" class="mini-meter-amount">&nbsp;</span><span id="mini-meter-rest"></span></div>
      </a>
    </section>

    <section>
      <div class="twitch-schedule">
        <a class="twitch-wordmark" href="https://www.twitch.tv/robpaaspoker" target="_blank" rel="noopener">
          <img src="https://cdn.simpleicons.org/twitch/9146FF" alt="" loading="lazy">
          <span>Twitch</span>
        </a>
        <span class="schedule-text">Live Thursday&ndash;Monday &middot; 4PM&ndash;1AM</span>
      </div>
      <div class="card video-wrap">
        <!-- Update the video ID here whenever there's a new VOD to feature -->
        <iframe
          src="https://player.twitch.tv/?video=2820038904&parent=robpaaspoker.com&parent=www.robpaaspoker.com&parent=robertjpaas-commits.github.io&parent=localhost"
          allowfullscreen
          scrolling="no">
        </iframe>
      </div>
    </section>

  </div>

  <script>
    fetch('Roadto$100k/data/2026.json', { cache: 'no-store' })
      .then((r) => r.json())
      .then((d) => {
        const total = d.days.reduce((sum, day) => sum + day.total, 0);
        const pct = Math.max(0, Math.min(100, (total / d.goal) * 100));
        const sign = total < 0 ? '-' : '+';
        const amount = Math.abs(total).toLocaleString('en-US', { maximumFractionDigits: 0 });
        document.getElementById('mini-meter-fill').style.width = pct.toFixed(1) + '%';
        const amountEl = document.getElementById('mini-meter-amount');
        amountEl.textContent = `${sign}$${amount}`;
        amountEl.className = 'mini-meter-amount ' + (total >= 0 ? 'positive' : 'negative');
        document.getElementById('mini-meter-rest').textContent = ` · ${pct.toFixed(1)}% to $100K`;
      })
      .catch(() => {});
  </script>
</body>
</html>
